<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SnapBudget OCR+ Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        margin: 0;
        padding: 0;
        background: #0f172a;
        color: #f9fafb;
      }
      .fallback {
        max-width: 960px;
        margin: 40px auto;
        padding: 24px;
        background: #020617;
        border-radius: 12px;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.9);
      }
      h1 {
        margin-top: 0;
      }
      .metrics {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
      }
      .card {
        padding: 16px;
        border-radius: 12px;
        background: linear-gradient(145deg, #0b1120, #020617);
        border: 1px solid rgba(148, 163, 184, 0.24);
      }
      label {
        display: block;
        margin-top: 8px;
        font-size: 14px;
      }
      input,
      button,
      textarea {
        width: 100%;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #1f2937;
        margin-top: 4px;
        background: #020617;
        color: #f9fafb;
      }
      button {
        cursor: pointer;
        background: linear-gradient(135deg, #06b6d4, #22c55e);
        border: none;
        font-weight: 600;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 16px;
        font-size: 14px;
      }
      th,
      td {
        padding: 8px;
        border-bottom: 1px solid #1f2937;
      }
      th {
        text-align: left;
        color: #9ca3af;
      }
      tr:nth-child(even) {
        background: #020617;
      }
      .tag {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 12px;
        background: rgba(56, 189, 248, 0.08);
        border: 1px solid rgba(56, 189, 248, 0.55);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="fallback">
        <h1>SnapBudget OCR+ Dashboard (Fallback)</h1>
        <p>
          React app will mount here. If it's not running, you can still hit the
          backend APIs manually using curl/Postman.
        </p>
        <p>
          Backend base URL:
          <code style="background:#020617;padding:2px 4px;border-radius:4px;"
            >http://localhost:5000</code
          >
        </p>
      </div>
    </div>
  </body>
</html>
